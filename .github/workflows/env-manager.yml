name: Environment Variable Manager

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  manage-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Environment Variables
        run: |
          echo "🔒 Starting Validation..."
          if [ -z "${{ secrets.DB_HOST }}" ]; then
            echo "❌ DB_HOST missing"
            exit 1
          fi
          echo "✅ Success"
